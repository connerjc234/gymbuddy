<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f2ec"/>
      <stop offset="100%" stop-color="#ece8e0"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d64550"/>
      <stop offset="100%" stop-color="#b73842"/>
    </linearGradient>
    <linearGradient id="plateInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c43e48"/>
      <stop offset="100%" stop-color="#a32e38"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4440"/>
      <stop offset="50%" stop-color="#2a2622"/>
      <stop offset="100%" stop-color="#1a1612"/>
    </linearGradient>
    <linearGradient id="sleeve" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a6258"/>
      <stop offset="100%" stop-color="#3a3430"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1612" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="40" cy="40" r="60" fill="#ece8e0" opacity="0.5"/>
  <circle cx="216" cy="216" r="50" fill="#ece8e0" opacity="0.4"/>

  <!-- Dumbbell -->
  <g transform="translate(128, 110)" filter="url(#shadow)">
    <!-- Bar shaft -->
    <rect x="-72" y="-8" width="144" height="16" rx="6" fill="url(#bar)"/>
    <!-- Bar highlight -->
    <rect x="-68" y="-5" width="136" height="3" rx="1.5" fill="#5a5450" opacity="0.5"/>
    <!-- Knurling marks -->
    <g stroke="#3a3632" stroke-width="1" opacity="0.6">
      <line x1="-50" y1="-5" x2="-50" y2="5"/>
      <line x1="-46" y1="-5" x2="-46" y2="5"/>
      <line x1="-42" y1="-5" x2="-42" y2="5"/>
      <line x1="42" y1="-5" x2="42" y2="5"/>
      <line x1="46" y1="-5" x2="46" y2="5"/>
      <line x1="50" y1="-5" x2="50" y2="5"/>
    </g>

    <!-- Left sleeve -->
    <rect x="-78" y="-26" width="12" height="52" rx="4" fill="url(#sleeve)"/>
    <!-- Right sleeve -->
    <rect x="66" y="-26" width="12" height="52" rx="4" fill="url(#sleeve)"/>

    <!-- Left plates -->
    <!-- Outer plate -->
    <rect x="-96" y="-36" width="22" height="72" rx="6" fill="url(#plate)"/>
    <rect x="-94" y="-32" width="18" height="64" rx="4" fill="none" stroke="#c43e48" stroke-width="0.5" opacity="0.3"/>
    <!-- Inner plate -->
    <rect x="-92" y="-30" width="6" height="60" rx="2" fill="url(#plateInner)"/>

    <!-- Right plates -->
    <!-- Inner plate -->
    <rect x="86" y="-30" width="6" height="60" rx="2" fill="url(#plateInner)"/>
    <!-- Outer plate -->
    <rect x="74" y="-36" width="22" height="72" rx="6" fill="url(#plate)"/>
    <rect x="76" y="-32" width="18" height="64" rx="4" fill="none" stroke="#c43e48" stroke-width="0.5" opacity="0.3"/>

    <!-- Left collar clip -->
    <rect x="-100" y="-10" width="6" height="20" rx="2" fill="#7a7265"/>
    <!-- Right collar clip -->
    <rect x="94" y="-10" width="6" height="20" rx="2" fill="#7a7265"/>

    <!-- Center grip -->
    <rect x="-10" y="-14" width="20" height="28" rx="5" fill="#8a8275"/>
    <rect x="-6" y="-10" width="12" height="20" rx="3" fill="#a39b8e"/>
    <rect x="-3" y="-6" width="6" height="12" rx="2" fill="#bab2a5"/>
  </g>

  <!-- Brand text -->
  <text x="128" y="200" font-family="Oswald, sans-serif" font-size="28" font-weight="700" fill="#1a1612" text-anchor="middle" letter-spacing="5">GYM</text>
  <text x="128" y="222" font-family="'Source Sans 3', sans-serif" font-size="13" font-weight="600" fill="#7a7265" text-anchor="middle" letter-spacing="3">BUDDY</text>
</svg>
