<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f2ec"/>
      <stop offset="100%" style="stop-color:#ece8e0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d64550"/>
      <stop offset="100%" style="stop-color:#b73842"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g transform="translate(128, 128)">
    <!-- Left weight -->
    <ellipse cx="-70" cy="0" rx="24" ry="30" fill="url(#accent)"/>
    <ellipse cx="-70" cy="0" rx="16" ry="22" fill="#f5f2ec"/>
    <!-- Bar -->
    <rect x="-60" y="-8" width="120" height="16" rx="4" fill="#c4a35a"/>
    <rect x="-55" y="-4" width="110" height="8" rx="2" fill="#e3dcc8"/>
    <!-- Right weight -->
    <ellipse cx="70" cy="0" rx="24" ry="30" fill="url(#accent)"/>
    <ellipse cx="70" cy="0" rx="16" ry="22" fill="#f5f2ec"/>
    <!-- Center grip -->
    <rect x="-8" y="-12" width="16" height="24" rx="3" fill="#7a7265"/>
    <rect x="-4" y="-10" width="8" height="20" rx="2" fill="#a39b8e"/>
  </g>
  <!-- "GYM" text -->
  <text x="128" y="200" font-family="Oswald, sans-serif" font-size="28" font-weight="700" fill="#1a1612" text-anchor="middle" letter-spacing="4">GYM</text>
  <text x="128" y="224" font-family="Source Sans 3, sans-serif" font-size="12" fill="#7a7265" text-anchor="middle" letter-spacing="2">BUDDY</text>
</svg>