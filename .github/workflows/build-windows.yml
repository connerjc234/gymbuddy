name: Build Windows .exe

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the build"
        required: false
        default: "0.2.0"

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "GymBuddy"
  VERSION: ${{ github.event.inputs.version || '0.2.0' }}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyYAML python-dateutil openai pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --noconsole `
            --name "${{ env.APP_NAME }}" `
            --icon "assets/gymbuddy.ico" `
            --add-data "assets/fonts;fonts" `
            --hidden-import "PyQt6.Qt6" `
            --hidden-import "PyQt6.QtCore" `
            --hidden-import "PyQt6.QtGui" `
            --hidden-import "PyQt6.QtWidgets" `
            --hidden-import "PyQt6.QtSvg" `
            --hidden-import "PyQt6.QtCharts" `
            --hidden-import "PyQt6.sip" `
            --collect-data "workout_tracker" `
            workout_tracker/main.py

      - name: Verify executable
        run: |
          if (Test-Path "dist/${{ env.APP_NAME }}.exe") {
            $size = (Get-Item "dist/${{ env.APP_NAME }}.exe").Length
            Write-Output "✅ ${{ env.APP_NAME }}.exe built: $([math]::Round($size / 1MB, 2)) MB"
          } else {
            Write-Error "❌ dist/${{ env.APP_NAME }}.exe not found!"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-win64
          path: dist/${{ env.APP_NAME }}.exe
          if-no-files-found: error

      - name: Create release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}.exe
          generate_release_notes: true
